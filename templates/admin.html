{% extends "layout.html" %}
{% block content %}

<h2 class="text-2xl font-bold mb-4">Admin Dashboard</h2>

<!-- CONFIG LIMIT -->
<div class="bg-white p-4 rounded shadow mb-4">
    <h3 class="font-semibold mb-2">Set OFF Limit per Day</h3>

    <div class="grid grid-cols-2 md:grid-cols-7 gap-2" id="limitBox"></div>

    <button onclick="saveLimit()" class="mt-3 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">
        Save Limit
    </button>
</div>

<!-- TABLE -->
<div class="bg-white p-4 rounded shadow overflow-x-auto">
    <table class="min-w-full border" id="table"></table>
</div>

<script>
    const DAYS = ["Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7", "Chủ nhật"];
    let configData = {};

    // ===== LOAD DATA =====
    function load() {
        $.ajax({
            url: "/api/schedule",
            headers: { Authorization: "Bearer " + localStorage.getItem("token") },
            success: function (schedule) {

                $.ajax({
                    url: "/api/admin/config",
                    headers: { Authorization: "Bearer " + localStorage.getItem("token") },
                    success: function (config) {

                        configData = config;
                        renderLimit(config);
                        renderTable(schedule);
                    }
                });

            }
        });
    }

    // ===== RENDER LIMIT =====
    function renderLimit(config) {
        let html = "";
        DAYS.forEach(d => {
            html += `
        <div>
            <label class="text-sm">${d}</label>
            <input type="number" min="0"
                id="limit_${d}"
                value="${config[d]}"
                class="border p-1 w-full rounded">
        </div>`;
        });
        $("#limitBox").html(html);
    }

    // ===== SAVE LIMIT =====
    function saveLimit() {
        let data = {};
        DAYS.forEach(d => {
            data[d] = parseInt($(`#limit_${d}`).val());
        });

        $.ajax({
            url: "/api/admin/set_limit",
            method: "POST",
            headers: { Authorization: "Bearer " + localStorage.getItem("token") },
            contentType: "application/json",
            data: JSON.stringify(data),
            success: res => {
                toast("Updated!", true);
            }
        });
    }

    // ===== TABLE =====
    function renderTable(res) {
        let html = "<tr class='bg-gray-200'><th>Name</th>";
        DAYS.forEach(d => html += `<th>${d}</th>`);
        html += "</tr>";

        for (let u in res) {

            let user = res[u];

            html += `<tr><td class="font-medium p-2">${u}</td>`;

            user.days.forEach((v, i) => {

                let day = DAYS[i];

                html += `
                <td class="text-center border p-2 cursor-pointer hover:bg-gray-100"
                    onclick="setOff(${user.id}, '${day}', '${v === "OFF" ? "" : "OFF"}')">
                    ${v === "OFF"
                        ? "<span class='bg-red-500 text-white px-2 py-1 rounded text-xs'>OFF</span>"
                        : ""}
                </td>`;
            });

            html += "</tr>";
        }

        $("#table").html(html);
    }

    // ===== SET OFF =====
    function setOff(userId, day, status) {
        $.ajax({
            url: "/api/admin/set_off",
            method: "POST",
            headers: { Authorization: "Bearer " + localStorage.getItem("token") },
            contentType: "application/json",
            data: JSON.stringify({
                user_id: userId,
                day: day,
                status: status
            }),
            success: res => {
                toast(res.msg || "Done", true);
                load();
            },
            error: err => {
                toast(err.responseJSON.msg, false);
            }
        });
    }

    load();
</script>

{% endblock %}
